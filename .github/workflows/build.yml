name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '*.txt'
  pull_request:
    paths-ignore:
      - '*.md'
      - '*.txt'

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: moonrepo/setup-rust@v1
        with:
          components: rustfmt
          bins: taplo-cli
      - name: Check .rs files
        run: cargo fmt --all -- --check
      - name: Check .toml files
        run: taplo check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: moonrepo/setup-rust@v1
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy -- -D warnings

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          bins: cargo-audit
      - name: Install udeps
        run: cargo install cargo-udeps --locked
      - name: Check for unused dependencies
        run: cargo +nightly udeps
      - name: Check for vulnerabilities
        run: cargo audit

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest, cargo-llvm-cov
          components: llvm-tools-preview
      - name: Run tests
        run: cargo llvm-cov nextest --lcov --output-path target/lcov.info
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/lcov.info
          verbose: true
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build library
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build library in release mode
        run: cargo build --lib --release
      - name: Upload release artifact
        uses: actions/upload-artifact@v3
        with:
          name: auto-palette
          path: target/release

  build-wasm:
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/auto-palette-wasm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build the WASM package for ${{ matrix.target }}
        run: wasm-pack build --release --target ${{ matrix.target }} --out-name wasm
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v3
        with:
          name: auto-palette-wasm
          path: crates/auto-palette-wasm/pkg

  build-web:
    needs:
      - build-wasm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/auto-palette
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
          cache-dependency-path: 'packages/auto-palette/pnpm-lock.yaml'
      - name: Download WASM artifact
        uses: actions/download-artifact@v3
        with:
          name: auto-palette-wasm
          path: crates/auto-palette-wasm/pkg
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check the lints
        run: pnpm lint
      - name: Build the JS package
        run: pnpm build
